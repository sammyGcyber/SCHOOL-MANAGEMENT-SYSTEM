<!DOCTYPE html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Create account | Campus Portal</title><link rel="stylesheet" th:href="@{/css/app.css}"></head><body class="auth-page"><main class="login-card signup-card"><a class="back" th:href="@{/login}">← Back to sign in</a><div class="brand-mark">C</div><p class="eyebrow">FIRST-TIME STUDENT</p><h1>Create your account</h1><p class="muted">Enter your details to access the student portal.</p><div class="alert error" th:if="${error}" th:text="${error}">Could not create account.</div><form class="signup-form" th:action="@{/signup}" method="post"><div class="field-grid"><label>First name<input name="firstName" required></label><label>Last name<input name="lastName" required></label></div><label>Registration number<input name="registrationNumber" required placeholder="e.g. STU/2026/001"></label><label>Email address<input name="email" type="email" required></label><label>Phone number<input name="phone" required></label><label>Username<input name="username" required></label><label>Password<input name="password" type="password" minlength="8" required placeholder="At least 8 characters"></label><button class="primary" type="submit">Create student account</button></form><p class="auth-switch">Already registered? <a th:href="@{/login}">Sign in</a></p></main></body></html>
