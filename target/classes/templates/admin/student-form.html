<!DOCTYPE html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Register student | Campus Portal</title><link rel="stylesheet" th:href="@{/css/app.css}"></head><body><main class="form-page"><a class="back" th:href="@{/admin/students}">← Back to students</a><section class="form-card"><p class="eyebrow">ADMISSIONS</p><h1>Register a student</h1><p class="muted">Create a new academic record. A portal account can be assigned afterwards.</p><form th:action="@{/admin/students}" th:object="${studentForm}" method="post" class="grid-form"><label>Registration number<input th:field="*{registrationNumber}" placeholder="e.g. CS/2026/001"><small th:errors="*{registrationNumber}"></small></label><label>First name<input th:field="*{firstName}" placeholder="First name"><small th:errors="*{firstName}"></small></label><label>Last name<input th:field="*{lastName}" placeholder="Last name"><small th:errors="*{lastName}"></small></label><label>Email address<input th:field="*{email}" type="email" placeholder="student@example.edu"><small th:errors="*{email}"></small></label><label>Phone number<input th:field="*{phone}" placeholder="+254 700 000 000"></label><div class="form-actions"><a th:href="@{/admin/students}">Cancel</a><button class="primary" type="submit">Save student</button></div></form></section></main></body></html>
