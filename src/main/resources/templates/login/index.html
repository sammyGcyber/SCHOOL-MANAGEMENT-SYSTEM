<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sign in | Campus Portal</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <link rel="stylesheet" th:href="@{/css/login-animation.css}">
</head>
<body class="auth-page auth-welcome">
<main class="auth-layout">
    <section class="login-scene login-illustration-panel" aria-label="Welcome to Campus Portal">
        <img class="login-illustration" th:src="@{/img/login-illustration.png}" alt="Student celebrating with a laptop">
    </section>

    <section class="login-card login-reveal">
        <div class="brand-mark">C</div>
        <p class="eyebrow">CAMPUS PORTAL</p>
        <h1>Welcome back</h1>
        <p class="muted">Sign in to manage your academic journey.</p>
        <div class="alert error" th:if="${param.error}">Invalid username or password.</div>
        <div class="alert success" th:if="${param.logout}">You have signed out securely.</div>
        <div class="alert success" th:if="${param.registered}">Your account has been created. You can sign in now.</div>
        <form th:action="@{/login}" method="post">
            <label>Username<input name="username" autocomplete="username" required autofocus placeholder="Enter your username"></label>
            <label>Password<input name="password" type="password" autocomplete="current-password" required placeholder="Enter your password"></label>
            <button class="primary" type="submit">Sign in <span>&rarr;</span></button>
        </form>
        <p class="auth-switch">New student? <a th:href="@{/signup}">Create an account</a></p>
        <details>
            <summary>Demo accounts</summary>
            <p><b>admin</b> / Admin@123<br><b>lecturer</b> / Lecturer@123<br><b>student</b> / Student@123</p>
        </details>
    </section>
</main>
</body>
</html>
