<!DOCTYPE html><html lang="en" xmlns:th="http://www.thymeleaf.org"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Students | Campus Portal</title><link rel="stylesheet" th:href="@{/css/app.css}"></head><body><div class="shell"><aside><a class="logo" th:href="@{/admin/dashboard}"><span>C</span> Campus</a><p class="side-label">ADMINISTRATION</p><a class="nav" th:href="@{/admin/dashboard}">◈ Dashboard</a><a class="nav active" href="#">◎ Students</a><a class="nav" href="#">♙ Lecturers</a><a class="nav" href="#">▤ Academic setup</a><form th:action="@{/logout}" method="post"><button class="nav logout">↪ Sign out</button></form></aside><main class="content"><header><div><p class="eyebrow">STUDENT DIRECTORY</p><h1>Students</h1><p class="muted">Register, find, and manage student records.</p></div><a class="primary inline" th:href="@{/admin/students/new}">+ Register student</a></header><div class="alert success" th:if="${success}" th:text="${success}"></div><section class="panel full"><form class="search" method="get"><input name="q" th:value="${q}" placeholder="Search by name or registration number"><button type="submit">Search</button></form><div class="table-wrap"><table><thead><tr><th>REGISTRATION NO.</th><th>STUDENT</th><th>EMAIL</th><th>PHONE</th><th></th></tr></thead><tbody><tr th:each="s : ${students}"><td><b th:text="${s.registrationNumber}">REG</b></td><td th:text="${s.firstName + ' ' + s.lastName}">Name</td><td th:text="${s.email}">email</td><td th:text="${s.phone ?: '—'}">—</td><td><form th:action="@{/admin/students/{id}/delete(id=${s.id})}" method="post"><button class="text-danger" onclick="return confirm('Remove this student?')">Remove</button></form></td></tr><tr th:if="${#lists.isEmpty(students)}"><td colspan="5"><div class="empty">No students found. Register your first student to get started.</div></td></tr></tbody></table></div></section></main></div></body></html>
